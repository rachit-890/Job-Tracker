services:
  postgres:
    image: postgres:16
    container_name: jobtrackr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobtrackr
      POSTGRES_USER: jobtrackr
      POSTGRES_PASSWORD: jobtrackr
    ports:
      - "5432:5432"
    volumes:
      - jobtrackr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrackr -d jobtrackr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobtrackr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - jobtrackr-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.1.1
    container_name: jobtrackr-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - jobtrackr-kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep kafka | grep -v grep"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  jobtrackr-pgdata:
  jobtrackr-redisdata:
  jobtrackr-kafkadata: