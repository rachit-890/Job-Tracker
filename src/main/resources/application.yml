server:
  port: 8080

spring:
  application:
    name: jobtrackr

  datasource:
    url: jdbc:postgresql://localhost:5432/jobtrackr
    username: jobtrackr
    password: jobtrackr
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Embed type info in headers so consumers can deserialize the correct payload type.
      properties:
        spring.json.add.type.headers: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      # Manual ack — consumers commit offset only after successful processing,
      # so a crash mid-processing doesn't lose the event.
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.rachit.jobtrackr.event"
    listener:
      ack-mode: MANUAL_IMMEDIATE

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jobtrackr:
  jwt:
    secret: "CHANGE_ME_DEV_ONLY_REPLACE_WITH_A_REAL_64_BYTE_SECRET_BEFORE_DEPLOY"
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  stale:
    default-threshold-days: 14
  public:
    base-url: "http://localhost:8080"

logging:
  level:
    com.rachit.jobtrackr: DEBUG
    org.apache.kafka: WARN        # Kafka is very chatty at INFO
    org.springframework.kafka: INFO