server:
  port: 8080

spring:
  application:
    name: jobtrackr

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobtrackr}
    username: ${DB_USERNAME:jobtrackr}
    password: ${DB_PASSWORD:jobtrackr}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.rachit.jobtrackr.event"
    listener:
      ack-mode: MANUAL_IMMEDIATE

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Actuator — exposes /actuator/health and /actuator/prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jobtrackr:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_DEV_ONLY_REPLACE_WITH_A_REAL_64_BYTE_SECRET_BEFORE_DEPLOY}
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  stale:
    default-threshold-days: 14
  public:
    base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  kafka:
    consumer-groups:
      ai: "jobtrackr.ai-consumer"
      analytics: "jobtrackr.analytics-consumer"
      reminder: "jobtrackr.reminder-consumer"
      notification: "jobtrackr.notification-consumer"
  gemini:
    api-key: ${JOBTRACKR_GEMINI_API_KEY}
    chat-model: "gemini-2.0-flash"
    embedding-model: "gemini-embedding-001"
    retry:
      max-attempts: 3
      initial-interval-ms: 1000
      multiplier: 2.0
  scheduler:
    stale-cron: "0 0 1 * * *"
    digest-cron: "0 0 9 * * MON"
    reminder-delay-ms: 900000
    reminder-max-attempts: 3
  notification:
    email-enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    from-address: ${NOTIFICATION_FROM_ADDRESS:noreply@jobtrackr.dev}

logging:
  level:
    com.rachit.jobtrackr: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    dev.langchain4j: WARN