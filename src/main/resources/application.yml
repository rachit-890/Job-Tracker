server:
  port: 8080

spring:
  application:
    name: jobtrackr

  datasource:
    url: jdbc:postgresql://localhost:5432/jobtrackr
    username: jobtrackr
    password: jobtrackr
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.rachit.jobtrackr.event"
    listener:
      ack-mode: MANUAL_IMMEDIATE

  data:
    redis:
      host: localhost
      port: 6379

  # Mail configuration — log-based stub works without SMTP.
  # To enable real email: set host/username/password and mail.enabled=true.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jobtrackr:
  jwt:
    secret: "CHANGE_ME_DEV_ONLY_REPLACE_WITH_A_REAL_64_BYTE_SECRET_BEFORE_DEPLOY"
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  stale:
    default-threshold-days: 14
  public:
    base-url: "http://localhost:8080"
  kafka:
    consumer-groups:
      ai: "jobtrackr.ai-consumer"
      analytics: "jobtrackr.analytics-consumer"
      reminder: "jobtrackr.reminder-consumer"
      notification: "jobtrackr.notification-consumer"
  gemini:
    api-key: "xxxxxxxxxxxxxxxxxxxxxxxx"
    chat-model: "gemini-2.0-flash"
    embedding-model: "gemini-embedding-001"
    retry:
      max-attempts: 3
      initial-interval-ms: 1000
      multiplier: 2.0

  # Phase 5: scheduler configuration
  scheduler:
    # Daily at 1am — flags stale APPLIED applications
    stale-cron: "0 0 1 * * *"
    # Every Monday at 9am — weekly digest
    digest-cron: "0 0 9 * * MON"
    # Every 15 minutes — polls due reminders and attempts delivery
    reminder-delay-ms: 900000
    # Max delivery attempts before marking a reminder FAILED
    reminder-max-attempts: 3

  # Phase 5: notification configuration
  notification:
    # Set to true and configure spring.mail.* for real email delivery.
    # false = log-only mode (default for local dev).
    email-enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    from-address: ${NOTIFICATION_FROM_ADDRESS:noreply@jobtrackr.dev}

logging:
  level:
    com.rachit.jobtrackr: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
    dev.langchain4j: WARN