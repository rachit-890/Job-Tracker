server:
  port: 8080

spring:
  application:
    name: JobTracker

  datasource:
    url: jdbc:postgresql://localhost:5432/jobtrackr
    username: jobtrackr
    password: jobtrackr
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false         # FIX: moved here, consistent with Hibernate config
    properties:
      hibernate:
        format_sql: false   # FIX: was true while show-sql was false — contradictory.
        # Both false until you actually need SQL debug output.

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jobtrackr:
  jwt:
    # Generate a strong secret with: openssl rand -base64 64
    # Minimum 32 characters — the app will fail fast at startup if shorter.
    secret: "CHANGE_ME_DEV_ONLY_REPLACE_WITH_A_REAL_64_BYTE_SECRET_BEFORE_DEPLOY"
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  stale:
    default-threshold-days: 14

logging:
  level:
    com.rachit.jobtrackr: DEBUG