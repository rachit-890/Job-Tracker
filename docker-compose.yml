services:
  postgres:
    image: postgres:16
    container_name: jobtrackr-postgres
    environment:
      POSTGRES_DB: jobtrackr
      POSTGRES_USER: jobtrackr
      POSTGRES_PASSWORD: jobtrackr
    ports:
      - "5432:5432"
    volumes:
      - jobtrackr-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobtrackr-redis
    ports:
      - "6379:6379"
    volumes:
      - jobtrackr-redisdata:/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: jobtrackr-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no Zookeeper needed.
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
    volumes:
      - jobtrackr-kafkadata:/bitnami/kafka

volumes:
  jobtrackr-pgdata:
  jobtrackr-redisdata:
  jobtrackr-kafkadata: