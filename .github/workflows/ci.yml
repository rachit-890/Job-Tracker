name: CI/CD Pipeline

on:
  push:
    branches: [ main, 'phase/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test, Analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobtrackr_test
          POSTGRES_USER: jobtrackr
          POSTGRES_PASSWORD: jobtrackr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jobtrackr_test
          SPRING_DATASOURCE_USERNAME: jobtrackr
          SPRING_DATASOURCE_PASSWORD: jobtrackr
          JOBTRACKR_GEMINI_API_KEY: test-key-not-used-in-unit-tests
          JWT_SECRET: test-secret-for-ci-at-least-32-characters-long

      - name: Checkstyle
        run: ./mvnw checkstyle:check -q
        continue-on-error: true

      - name: SpotBugs
        run: ./mvnw spotbugs:check -q
        continue-on-error: true

      - name: Build jar
        run: ./mvnw package -DskipTests -q

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobtrackr-jar
          path: target/*.jar
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jobtrackr:latest
            ${{ secrets.DOCKER_USERNAME }}/jobtrackr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{}'
